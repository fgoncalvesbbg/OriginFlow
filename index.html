
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OriginFlow PLM</title>
    <!-- Modern Font Import -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          extend: {
            // Tightened radius scale — crisper, more enterprise corners than the
            // Tailwind defaults. Merged via `extend`, so `full`/`none` (avatars,
            // badges, pills) keep their original values.
            borderRadius: {
              DEFAULT: '0.25rem', // 4px
              sm: '0.1875rem',    // 3px
              md: '0.3125rem',    // 5px
              lg: '0.375rem',     // 6px
              xl: '0.5rem',       // 8px
              '2xl': '0.75rem',   // 12px
            },
            colors: {
              // Brand neutrals
              primary: '#1a1f35',        // Control-Room Ink — sidebar bg + body text
              secondary: '#6b7280',      // Refined gray — secondary text
              muted: '#9ca3af',          // Soft gray — muted text / icons
              light: '#f9fafb',          // Canvas — app background
              surface: '#ffffff',        // Raised surfaces (cards, top bar, panels)
              border: '#e5e7eb',         // Hairline borders / dividers
              // Action accent — Steel Slate: a muted, corporate blue-gray (replaces the
              // saturated indigo for a calmer, more professional feel).
              accent: '#3f5b73',         // Steel Slate — primary action / active / selection
              'accent-hover': '#324a5e', // Steel Slate, deepened for hover
              // Semantic status (see DESIGN.md status vocabulary)
              success: '#047857',        // Progress Emerald
              warning: '#b45309',        // Pending Amber
              danger: '#be123c',         // Blocked Rose
              // Remap the indigo/blue Tailwind scales (used app-wide) onto the same
              // Steel Slate ramp so every existing `indigo-*` / `blue-*` class reads as
              // the professional accent rather than the old "AI" violet-blue.
              indigo: {
                50:  '#f3f6f8',
                100: '#e3eaef',
                200: '#c7d4dd',
                300: '#a0b4c2',
                400: '#7390a3',
                500: '#527088',
                600: '#3f5b73',
                700: '#34495d',
                800: '#2d3e4e',
                900: '#283543',
              },
              blue: {
                50:  '#f3f6f8',
                100: '#e3eaef',
                200: '#c7d4dd',
                300: '#a0b4c2',
                400: '#7390a3',
                500: '#527088',
                600: '#3f5b73',
                700: '#34495d',
                800: '#2d3e4e',
                900: '#283543',
              },
            }
          }
        }
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6",
    "@supabase/supabase-js": "https://aistudiocdn.com/@supabase/supabase-js@^2.83.0",
    "jspdf": "https://aistudiocdn.com/jspdf@^2.5.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "@google/genai": "https://esm.run/@google/genai",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
  <body class="bg-light text-primary antialiased">
    <div id="root"></div>
    <!-- Load the main React entry point -->
    <script type="module" src="./src/app/main.tsx"></script>
  </body>
</html>
