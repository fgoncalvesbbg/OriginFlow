[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# Server-side functions (PDF render, supplier file signed-URL issuer). These read
# SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY from the Netlify site environment
# (server-only — do NOT use a VITE_ prefix).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
