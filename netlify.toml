[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"

# Server-side functions (e.g. the Gemini proxy). Requires GEMINI_API_KEY to be set in the
# Netlify site environment (server-only — do NOT use a VITE_ prefix).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
